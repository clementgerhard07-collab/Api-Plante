<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Résultat</title>
</head>

<body>

<h1>Résultat identification plante</h1>
<h2>Résultat :</h2>


{% for plant in results %}

<div class="result">
    <p><strong>Nom scientifique :</strong> {{ plant.species.scientificNameWithoutAuthor }}</p>
    <p><strong>Score :</strong> {{ plant.score_percent }} % </p>
</div>
{% endfor %}
<p>Santé de la plante : {{ health }}</p>

<a href="{% url 'upload' %}">Retour</a>

<style>
body{
    font-family: Arial;
    text-align:center;
}

.result{
    border:1px solid #ccc;
    padding:15px;
    margin:10px;
    border-radius:10px;
}
</style>

</body>
</html>
